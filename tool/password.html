<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器</title>
<style>
  :root {
    --primary: #ff6b35;
    --primary-light: #ff8f5e;
    --bg: #faf8f5;
    --bg-card: #ffffff;
    --text: #1a1410;
    --text-sub: #6b5e52;
    --text-mute: #a89a8e;
    --border: rgba(0,0,0,0.07);
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 28px 24px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text-sub);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--primary); }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 22px;
    color: var(--text);
  }
  .password-display {
    position: relative;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 16px 56px 16px 18px;
    margin-bottom: 20px;
    min-height: 60px;
    display: flex;
    align-items: center;
    word-break: break-all;
    font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', 'Courier New', monospace;
    font-size: 24px;
    line-height: 1.4;
    color: var(--text);
    border: 1px solid var(--border);
    user-select: all;
  }
  .copy-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    color: var(--text-sub);
    transition: all 0.2s;
  }
  .copy-btn:hover { color: var(--primary); border-color: var(--primary-light); }
  .strength-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .strength-label {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: -16px;
    margin-bottom: 24px;
    text-align: right;
  }
  .slider-group { margin-bottom: 20px; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .slider-header label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .slider-header .length-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    min-width: 28px;
    text-align: center;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    border: 3px solid var(--bg-card);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    border: 3px solid var(--bg-card);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }
  .option-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    user-select: none;
  }
  .option-item input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--text-mute);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }
  .option-item input[type="checkbox"]:checked {
    background: var(--primary);
    border-color: var(--primary);
  }
  .option-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .btn-generate {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--primary);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
    margin-bottom: 10px;
  }
  .btn-generate:hover { background: var(--primary-light); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-copy {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-copy:hover {
    border-color: var(--primary-light);
    color: var(--primary);
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 460px) {
    .container { padding: 20px 16px 24px; }
    .password-display { font-size: 20px; padding-right: 50px; }
  }
[data-theme="dark"] {
  --bg: #13100e; --bg-card: #1f1a17; --text: #f5ede6;
  --text-sub: #d4c0b0; --text-mute: #9a8070; --border: rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('tbox_theme')||'light')</script>

<div class="container">
  <a href="/" target="_top" style="display:inline-flex;align-items:center;gap:4px;color:var(--text-sub);text-decoration:none;font-size:14px;padding:6px 0;">← 返回首页</a>
  <h1>🔐 密码生成器</h1>

  <div class="password-display" id="passwordDisplay">P@ssw0rd!23</div>
  <button class="copy-btn" id="floatingCopyBtn" title="复制密码">📋</button>

  <div class="strength-bar">
    <div class="strength-fill" id="strengthFill"></div>
  </div>
  <div class="strength-label" id="strengthLabel">中等</div>

  <div class="slider-group">
    <div class="slider-header">
      <label>密码长度</label>
      <span class="length-value" id="lengthValue">16</span>
    </div>
    <input type="range" id="lengthSlider" min="8" max="32" value="16">
  </div>

  <div class="options">
    <label class="option-item">
      <input type="checkbox" id="chkUpper" checked>
      包含大写字母
    </label>
    <label class="option-item">
      <input type="checkbox" id="chkNumber" checked>
      包含数字
    </label>
    <label class="option-item">
      <input type="checkbox" id="chkSymbol" checked>
      包含特殊符号
    </label>
  </div>

  <button class="btn-generate" id="generateBtn">🔄 生成密码</button>
  <button class="btn-copy" id="copyBtn">📋 复制密码</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const DIGIT = '0123456789';
  const SYMBOL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

  const passwordDisplay = document.getElementById('passwordDisplay');
  const floatingCopyBtn = document.getElementById('floatingCopyBtn');
  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const lengthSlider = document.getElementById('lengthSlider');
  const lengthValue = document.getElementById('lengthValue');
  const chkUpper = document.getElementById('chkUpper');
  const chkNumber = document.getElementById('chkNumber');
  const chkSymbol = document.getElementById('chkSymbol');
  const strengthFill = document.getElementById('strengthFill');
  const strengthLabel = document.getElementById('strengthLabel');
  const toast = document.getElementById('toast');

  function getCharset() {
    let chars = LOWER;
    if (chkUpper.checked) chars += UPPER;
    if (chkNumber.checked) chars += DIGIT;
    if (chkSymbol.checked) chars += SYMBOL;
    return chars;
  }

  function hasUpper(pw) { return /[A-Z]/.test(pw); }
  function hasLower(pw) { return /[a-z]/.test(pw); }
  function hasDigit(pw) { return /[0-9]/.test(pw); }
  function hasSymbol(pw) { return /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(pw); }

  function secureRandomInt(max) {
    if (max <= 0) return 0;
    const byteLen = max <= 256 ? 1 : 2;
    const limit = byteLen === 1 ? 256 : 65536;
    const extra = limit % max;
    const safeLimit = limit - extra;
    let val;
    do {
      const buf = new Uint8Array(byteLen);
      crypto.getRandomValues(buf);
      val = byteLen === 1 ? buf[0] : (buf[0] << 8) | buf[1];
    } while (val >= safeLimit);
    return val % max;
  }

  function generatePassword() {
    const len = parseInt(lengthSlider.value, 10);
    const chars = getCharset();

    if (chars.length === 0) return '';

    // Determine which character types must be included
    const mustUpper = chkUpper.checked;
    const mustNumber = chkNumber.checked;
    const mustSymbol = chkSymbol.checked;
    const mustLower = true; // always at least one lowercase if using default set

    // Build a list of required pools
    const pools = [];
    if (mustLower) pools.push(LOWER);
    if (mustUpper) pools.push(UPPER);
    if (mustNumber) pools.push(DIGIT);
    if (mustSymbol) pools.push(SYMBOL);

    // If only one pool is active, just fill randomly from it
    if (pools.length <= 1) {
      const pool = pools.length === 0 ? LOWER : pools[0];
      let pw = '';
      for (let i = 0; i < len; i++) {
        pw += pool[secureRandomInt(pool.length)];
      }
      return pw;
    }

    // Ensure at least one char from each active pool
    const pwArr = [];
    for (let i = 0; i < pools.length; i++) {
      pwArr.push(pools[i][secureRandomInt(pools[i].length)]);
    }

    // Fill the rest from the full charset
    for (let i = pwArr.length; i < len; i++) {
      pwArr.push(chars[secureRandomInt(chars.length)]);
    }

    // Fisher-Yates shuffle
    for (let i = pwArr.length - 1; i > 0; i--) {
      const j = secureRandomInt(i + 1);
      [pwArr[i], pwArr[j]] = [pwArr[j], pwArr[i]];
    }

    return pwArr.join('');
  }

  function assessStrength(pw) {
    const len = pw.length;
    const types = [hasLower(pw), hasUpper(pw), hasDigit(pw), hasSymbol(pw)].filter(Boolean).length;

    if (len >= 20 && types >= 3) return { level: 'strong', pct: 100 };
    if (len >= 14 && types >= 2) return { level: 'strong', pct: 95 };
    if (len >= 10 && types >= 3) return { level: 'strong', pct: 90 };
    if (len >= 12 && types >= 2) return { level: 'medium', pct: 62 };
    if (len >= 8 && types >= 2) return { level: 'medium', pct: 55 };
    if (len >= 10) return { level: 'medium', pct: 50 };
    return { level: 'weak', pct: 28 };
  }

  function updateStrength(pw) {
    const { level, pct } = assessStrength(pw);
    strengthFill.style.width = pct + '%';
    if (level === 'strong') {
      strengthFill.style.background = '#22c55e';
      strengthLabel.textContent = '强';
    } else if (level === 'medium') {
      strengthFill.style.background = '#f59e0b';
      strengthLabel.textContent = '中等';
    } else {
      strengthFill.style.background = '#ef4444';
      strengthLabel.textContent = '弱';
    }
  }

  function updatePassword() {
    const pw = generatePassword();
    passwordDisplay.textContent = pw || '(请至少选择一种字符类型)';
    updateStrength(pw || '');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function copyPassword() {
    const text = passwordDisplay.textContent;
    if (!text || text === '(请至少选择一种字符类型)') return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板')).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('已复制到剪贴板'); } catch(e) { showToast('复制失败'); }
    document.body.removeChild(ta);
  }

  // Init
  lengthSlider.addEventListener('input', function() {
    lengthValue.textContent = this.value;
    updatePassword();
  });

  chkUpper.addEventListener('change', updatePassword);
  chkNumber.addEventListener('change', updatePassword);
  chkSymbol.addEventListener('change', updatePassword);
  generateBtn.addEventListener('click', updatePassword);
  copyBtn.addEventListener('click', copyPassword);
  floatingCopyBtn.addEventListener('click', copyPassword);

  // Generate initial password
  updatePassword();
})();
</script>
</body>
</html>
