<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>颜色取色器</title>
<style>
  :root {
    --primary:#ff6b35;
    --primary-light:#ff8f5e;
    --bg:#faf8f5;
    --bg-card:#ffffff;
    --text:#1a1410;
    --text-sub:#6b5e52;
    --text-mute:#a89a8e;
    --border:rgba(0,0,0,0.07);
    --radius:18px;
    --radius-sm:10px;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans SC','PingFang SC',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .container {
    width:100%;
    max-width:420px;
    background:var(--bg-card);
    border-radius:var(--radius);
    padding:32px 24px;
    box-shadow:0 2px 20px var(--border);
  }
  .top-link {
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:14px;
    color:var(--text-sub);
    text-decoration:none;
    margin-bottom:24px;
    transition:color .15s;
  }
  .top-link:hover { color:var(--primary); }

  .swatch-wrap {
    position:relative;
    margin-bottom:24px;
  }
  .swatch {
    width:100%;
    height:140px;
    border-radius:var(--radius);
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    transition:background .15s;
  }
  .swatch-label {
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(4px);
    padding:4px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--text);
    pointer-events:none;
  }

  .picker-wrap {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:24px;
  }
  .picker-wrap label {
    font-size:13px;
    color:var(--text-sub);
    margin-bottom:10px;
  }
  .color-input {
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid var(--border);
    padding:0;
    cursor:pointer;
    outline:none;
    background:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .color-input::-webkit-color-swatch-wrapper { padding:0; }
  .color-input::-webkit-color-swatch {
    border:none;
    border-radius:50%;
  }
  .color-input::-moz-color-swatch {
    border:none;
    border-radius:50%;
  }
  .color-input:hover { border-color:var(--primary-light); }
  .color-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(255,107,53,0.12); }

  .value-list { margin-bottom:24px; display:flex; flex-direction:column; gap:8px; }
  .value-row {
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--bg);
    border-radius:var(--radius-sm);
    padding:8px 12px;
  }
  .value-label {
    font-size:12px;
    font-weight:700;
    color:var(--text-mute);
    width:36px;
    flex-shrink:0;
    letter-spacing:0.04em;
  }
  .value-text {
    flex:1;
    font-size:15px;
    font-family:SF Mono,Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums;
    color:var(--text);
    user-select:all;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .copy-btn {
    flex-shrink:0;
    width:32px;
    height:32px;
    border-radius:8px;
    border:1.5px solid var(--border);
    background:var(--bg-card);
    color:var(--text-sub);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .15s;
  }
  .copy-btn:hover { border-color:var(--primary-light); color:var(--primary); }
  .copy-btn.copied {
    background:var(--primary);
    border-color:var(--primary);
    color:#fff;
  }

  .presets {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .preset-dot {
    width:36px;
    height:36px;
    border-radius:50%;
    border:2px solid var(--border);
    cursor:pointer;
    transition:transform .15s, border-color .15s, box-shadow .15s;
    flex-shrink:0;
  }
  .preset-dot:hover {
    transform:scale(1.18);
    border-color:var(--primary-light);
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
  }
  .preset-dot:active { transform:scale(0.95); }

  .toast {
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%) translateY(-80px);
    background:var(--primary);
    color:#fff;
    padding:10px 22px;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-family:inherit;
    box-shadow:0 4px 20px rgba(255,107,53,.35);
    opacity:0;
    transition:all .35s ease;
    pointer-events:none;
    z-index:999;
    white-space:nowrap;
  }
  .toast.show {
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
[data-theme="dark"] {
  --bg: #13100e; --bg-card: #1f1a17; --text: #f5ede6;
  --text-sub: #d4c0b0; --text-mute: #9a8070; --border: rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('tbox_theme')||'light')</script>

<div class="toast" id="toast"></div>

<div class="container">

  <a href="/" target="_top" style="display:inline-flex;align-items:center;gap:4px;color:var(--text-sub);text-decoration:none;font-size:14px;padding:6px 0;">← 返回首页</a>

  <div class="swatch-wrap">
    <div class="swatch" id="swatch"></div>
    <div class="swatch-label" id="swatchLabel">#ff6b35</div>
  </div>

  <div class="picker-wrap">
    <label>选择颜色</label>
    <input type="color" class="color-input" id="colorPicker" value="#ff6b35">
  </div>

  <div class="value-list" id="valueList">
    <div class="value-row">
      <span class="value-label">HEX</span>
      <span class="value-text" id="hexValue">#ff6b35</span>
      <button class="copy-btn" data-target="hex" title="复制 HEX">📋</button>
    </div>
    <div class="value-row">
      <span class="value-label">RGB</span>
      <span class="value-text" id="rgbValue">rgb(255, 107, 53)</span>
      <button class="copy-btn" data-target="rgb" title="复制 RGB">📋</button>
    </div>
    <div class="value-row">
      <span class="value-label">HSL</span>
      <span class="value-text" id="hslValue">hsl(16, 100%, 60%)</span>
      <button class="copy-btn" data-target="hsl" title="复制 HSL">📋</button>
    </div>
  </div>

  <div class="presets" id="presets">
    <div class="preset-dot" style="background:#e74c3c" data-color="#e74c3c" title="红色"></div>
    <div class="preset-dot" style="background:#ff6b35" data-color="#ff6b35" title="橙色"></div>
    <div class="preset-dot" style="background:#f1c40f" data-color="#f1c40f" title="黄色"></div>
    <div class="preset-dot" style="background:#2ecc71" data-color="#2ecc71" title="绿色"></div>
    <div class="preset-dot" style="background:#3498db" data-color="#3498db" title="蓝色"></div>
    <div class="preset-dot" style="background:#9b59b6" data-color="#9b59b6" title="紫色"></div>
    <div class="preset-dot" style="background:#e91e90" data-color="#e91e90" title="粉色"></div>
    <div class="preset-dot" style="background:#222" data-color="#222222" title="黑色"></div>
    <div class="preset-dot" style="background:#fff;border-color:#ccc" data-color="#ffffff" title="白色"></div>
  </div>

</div>

<script>
(function(){
  var picker = document.getElementById('colorPicker');
  var swatch = document.getElementById('swatch');
  var swatchLabel = document.getElementById('swatchLabel');
  var hexEl = document.getElementById('hexValue');
  var rgbEl = document.getElementById('rgbValue');
  var hslEl = document.getElementById('hslValue');
  var toast = document.getElementById('toast');

  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return { r: r, g: g, b: b };
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    var max = Math.max(r, g, b), min = Math.min(r, g, b);
    var h, s, l = (max + min) / 2;
    if (max === min) {
      h = s = 0;
    } else {
      var d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        case b: h = ((r - g) / d + 4) / 6; break;
      }
    }
    return {
      h: Math.round(h * 360),
      s: Math.round(s * 100),
      l: Math.round(l * 100)
    };
  }

  function updateColor(hex) {
    var rgb = hexToRgb(hex);
    var hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

    swatch.style.background = hex;
    swatchLabel.textContent = hex;
    hexEl.textContent = hex;
    rgbEl.textContent = 'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')';
    hslEl.textContent = 'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)';
    picker.value = hex;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function(){ toast.classList.remove('show'); }, 1800);
  }

  picker.addEventListener('input', function(){
    updateColor(this.value);
  });

  document.querySelectorAll('.copy-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var target = this.dataset.target;
      var text = '';
      if (target === 'hex') text = hexEl.textContent;
      else if (target === 'rgb') text = rgbEl.textContent;
      else if (target === 'hsl') text = hslEl.textContent;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function(){
          var original = this.innerHTML;
          this.innerHTML = '&#10003;';
          this.classList.add('copied');
          showToast('已复制 ' + target.toUpperCase());
          var self = this;
          setTimeout(function(){
            self.innerHTML = '📋';
            self.classList.remove('copied');
          }, 1200);
        }.bind(this)).catch(function(){
          fallbackCopy(text, this);
        }.bind(this));
      } else {
        fallbackCopy(text, this);
      }
    });
  });

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      btn.innerHTML = '&#10003;';
      btn.classList.add('copied');
      showToast('已复制');
      setTimeout(function(){
        btn.innerHTML = '📋';
        btn.classList.remove('copied');
      }, 1200);
    } catch(e) {}
    document.body.removeChild(ta);
  }

  document.querySelectorAll('.preset-dot').forEach(function(dot){
    dot.addEventListener('click', function(){
      var color = this.dataset.color;
      updateColor(color);
    });
  });

  // init
  updateColor(picker.value);
})();
</script>
</body>
</html>
