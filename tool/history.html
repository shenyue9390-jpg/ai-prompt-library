<style>
:root {
  --primary: #ff6b35;
  --primary-light: #ff8f5e;
  --bg: #faf8f5;
  --bg-card: #ffffff;
  --text: #1a1410;
  --text-sub: #6b5e52;
  --text-mute: #a89a8e;
  --border: rgba(0,0,0,0.07);
  --radius: 18px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 16px 40px;
}
.container {
  width: 100%;
  max-width: 420px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--text-sub);
  text-decoration: none;
  font-size: 14px;
  padding: 6px 0;
  transition: color 0.2s;
}
.back-link:hover { color: var(--primary); }
.back-link svg { width: 16px; height: 16px; fill: currentColor; }

.header { margin: 12px 0 4px; }
.header .date-display {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 14px;
  color: var(--text-sub);
  margin-top: 4px;
}

.events-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.event-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
}
.event-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.06);
}

.year-badge {
  flex-shrink: 0;
  width: 60px;
  height: 36px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  margin-top: 1px;
}
.event-body { flex: 1; min-width: 0; }
.event-title {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--text);
}
.event-desc {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.6;
  margin-top: 4px;
}

.share-btn {
  display: block;
  width: 100%;
  max-width: 280px;
  margin: 28px auto 0;
  padding: 12px 0;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.25s, transform 0.15s;
}
.share-btn:hover { background: var(--primary-light); }
.share-btn:active { transform: scale(0.97); }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 10px 22px;
  border-radius: 50px;
  font-size: 14px;
  opacity: 0;
  transition: transform 0.35s cubic-bezier(.22,.61,.36,1), opacity 0.35s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.fallback-note {
  text-align: center;
  font-size: 12px;
  color: var(--text-mute);
  margin: 16px 0 0;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

@media (max-width: 460px) {
  body { padding: 14px 12px 30px; }
  .header .date-display { font-size: 21px; }
}
[data-theme="dark"] {
  --bg: #13100e; --bg-card: #1f1a17; --text: #f5ede6;
  --text-sub: #d4c0b0; --text-mute: #9a8070; --border: rgba(255,255,255,0.15);
}

function getMonthDay() {
  var d = new Date();
  return (d.getMonth() + 1) + '-' + d.getDate();
}

function formatDateDisplay() {
  var d = new Date();
  var y = d.getFullYear();
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return '今天是 ' + y + '年' + m + '月' + day + '日';
}

function getEventsForDate(key) {
  if (DATA[key]) return DATA[key];
  return null;
}

function pickRandomFallback(count) {
  var pool = FALLBACK_EVENTS.slice();
  var result = [];
  for (var i = 0; i < count; i++) {
    if (pool.length === 0) break;
    var idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

function render() {
  var md = getMonthDay();
  document.getElementById('dateDisplay').textContent = formatDateDisplay();

  var events = getEventsForDate(md);
  var isFallback = false;
  if (!events) {
    isFallback = true;
    events = pickRandomFallback(3);
  }

  var listEl = document.getElementById('eventsList');
  var html = '';
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    html += '<div class="event-card">';
    html += '  <div class="year-badge">' + e.year + '</div>';
    html += '  <div class="event-body">';
    html += '    <div class="event-title">' + e.title + '</div>';
    html += '    <div class="event-desc">' + e.desc + '</div>';
    html += '  </div>';
    html += '</div>';
  }
  listEl.innerHTML = html;

  var noteEl = document.getElementById('fallbackNote');
  if (isFallback) {
    noteEl.style.display = 'block';
  } else {
    noteEl.style.display = 'none';
  }
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() {
    el.classList.remove('show');
  }, 2200);
}

render();

})();
</script>
</body>
</html>
