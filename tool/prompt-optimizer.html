<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --bg: #0d0d18;
  --card-bg: #161625;
  --card-border: rgba(255,255,255,0.04);
  --text: #ededf5;
  --text-sub: #b5b1c8;
  --text-mute: #a09cb8;
  --accent: #7b6ef0;
  --tab-active-bg: #ffffff;
  --tab-active-text: #1a1a2e;
  --tab-inactive-bg: rgba(255,255,255,0.04);
  --tab-inactive-text: #8a87a0;
  --search-bg: rgba(255,255,255,0.05);
  --search-border: rgba(255,255,255,0.08);
  --radius: 16px;
  --radius-sm: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

.container { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }

/* ── Header ── */
.header { margin-bottom: 18px; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
.header-back {
  display: flex; align-items: center; gap: 4px; color: var(--text-sub);
  text-decoration: none; font-size: 13px; opacity: 0.7;
}
.header-sub { font-size: 12px; color: var(--text-mute); }

/* ── Quick Links ── */
.quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.quick-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 16px;
  font-size: 12px; font-weight: 500; font-family: inherit;
  text-decoration: none; white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  color: var(--text-sub);
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.quick-link:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.12); }
.quick-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.ql-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ql-dot.doubao { background: #5ce5b5; }
.ql-dot.deepseek { background: #4d6bfe; }
.ql-dot.qianwen { background: #6b5ce7; }
.ql-dot.kimi { background: #a78bfa; }
.ql-dot.chatgpt { background: #34d399; }

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input {
  width: 100%; height: 40px; border-radius: 20px;
  border: 1px solid var(--search-border);
  background: var(--search-bg); color: var(--text);
  font-size: 14px; font-family: inherit;
  padding: 0 16px 0 40px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-wrap input::placeholder { color: var(--text-mute); }
.search-wrap input:focus {
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
}
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--text-mute); pointer-events: none;
}

/* ── Tabs ── */
.tabs-wrap { position: relative; margin-bottom: 18px; }
.tabs-wrap::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
  background: linear-gradient(to right, transparent, var(--bg));
  pointer-events: none; border-radius: 0 20px 20px 0;
  opacity: 0; transition: opacity 0.2s;
}
.tabs-wrap.scrollable::after { opacity: 1; }
.tabs {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; padding-right: 40px;
  scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  border: none; cursor: pointer; font-family: inherit; white-space: nowrap;
  background: var(--tab-inactive-bg); color: var(--tab-inactive-text);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active {
  background: var(--tab-active-bg); color: var(--tab-active-text); font-weight: 600;
}
.tab:active { transform: scale(0.95); }
.tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── Recent Section ── */
.recent-section { margin-bottom: 16px; }
.recent-label {
  font-size: 12px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.recent-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04); }
.recent-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.recent-row::-webkit-scrollbar { display: none; }
.recent-chip {
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px 6px 8px; border-radius: 20px; font-size: 12px; font-family: inherit;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05);
  color: var(--text-sub); cursor: pointer; transition: all 0.2s;
  white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.recent-chip:hover { background: rgba(255,255,255,0.08); color: #fff; }
.recent-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.recent-chip .rc-emoji { font-size: 14px; }

/* ── Grid ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid.single { grid-template-columns: 1fr; }

/* ── Card ── */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--card-border); padding: 18px 16px 16px;
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column; gap: 8px;
  font-family: inherit; color: inherit; text-align: left;
  width: 100%; -webkit-appearance: none; appearance: none;
}
.card:active { transform: scale(0.97); background: #1e1e30; }
.card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-color: var(--accent); }

.card-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.card-icon.c1 { background: rgba(124,111,247,0.15); color: #a99bff; }
.card-icon.c2 { background: rgba(0,184,148,0.12); color: #34d399; }
.card-icon.c3 { background: rgba(245,158,11,0.12);  color: #fbbf24; }
.card-icon.c4 { background: rgba(239,68,68,0.10);  color: #f87171; }
.card-icon.c5 { background: rgba(59,130,246,0.12); color: #60a5fa; }
.card-icon.c6 { background: rgba(236,72,153,0.10); color: #f472b6; }
.card-icon.c7 { background: rgba(168,85,247,0.12); color: #c084fc; }
.card-icon.c8 { background: rgba(20,184,166,0.10); color: #2dd4bf; }

.card-title { font-size: 15px; font-weight: 700; line-height: 1.3; color: #fff; }
.card-desc {
  font-size: 12px; color: var(--text-sub); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-inputs {
  font-size: 11px; color: var(--text-mute);
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
}
.card-inputs svg { flex-shrink: 0; }

/* ── Custom Card ── */
.custom-card {
  background: linear-gradient(135deg, rgba(124,111,247,0.10), rgba(124,111,247,0.02));
  border: 1px dashed rgba(124,111,247,0.25); border-radius: var(--radius);
  padding: 18px 16px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px; grid-column: 1 / -1;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit; color: inherit; text-align: left;
  width: 100%; -webkit-appearance: none; appearance: none;
}
.custom-card:active { transform: scale(0.97); }
.custom-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.custom-icon {
  width: 44px; height: 44px; background: rgba(124,111,247,0.18);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.custom-title { font-size: 14px; font-weight: 600; }
.custom-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* ── Empty ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text-mute); grid-column: 1 / -1; }
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-text { font-size: 14px; margin-bottom: 4px; }
.empty-hint { font-size: 12px; color: var(--text-mute); margin-bottom: 16px; }
.empty-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.empty-btn {
  padding: 8px 18px; border-radius: 20px; font-size: 13px; font-family: inherit;
  border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
  background: rgba(255,255,255,0.05); color: var(--text-sub);
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.empty-btn.accent {
  background: rgba(124,111,247,0.15); border-color: rgba(124,111,247,0.25); color: #b5adff;
}
.empty-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.empty-btn.accent:hover { background: rgba(124,111,247,0.25); }
.empty-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; visibility: hidden; transition: opacity 0.25s, visibility 0s 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; visibility: visible; transition: opacity 0.25s, visibility 0s 0s; }

.modal {
  background: #1c1c2e; border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px; padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  transform: translateY(40px); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  max-height: 80dvh; display: flex; flex-direction: column;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; margin: 0 auto 16px; }

.modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.modal-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.modal-icon.c1 { background: rgba(124,111,247,0.15); color: #a99bff; }
.modal-icon.c2 { background: rgba(0,184,148,0.12); color: #34d399; }
.modal-icon.c3 { background: rgba(245,158,11,0.12);  color: #fbbf24; }
.modal-icon.c4 { background: rgba(239,68,68,0.10);  color: #f87171; }
.modal-icon.c5 { background: rgba(59,130,246,0.12); color: #60a5fa; }
.modal-icon.c6 { background: rgba(236,72,153,0.10); color: #f472b6; }
.modal-icon.c7 { background: rgba(168,85,247,0.12); color: #c084fc; }
.modal-icon.c8 { background: rgba(20,184,166,0.10); color: #2dd4bf; }
.modal-title { font-size: 17px; font-weight: 700; flex: 1; }

.modal-close {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.06); color: var(--text-sub);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.modal-close:hover { background: rgba(255,255,255,0.12); }
.modal-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.modal-body { flex: 1; overflow-y: auto; padding-bottom: 16px; }

.modal-inputs {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.modal-input-tag {
  font-size: 11px; padding: 4px 10px; border-radius: 12px;
  background: rgba(124,111,247,0.12); color: #b5adff;
  border: 1px solid rgba(124,111,247,0.18);
}

.modal-prompt {
  background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); padding: 16px;
  font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; color: #ccc;
}

.modal-footer { margin-top: 14px; }
.btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: inherit; font-size: 14px; font-weight: 600; padding: 12px;
  border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-copied { background: #34d399; color: #0d0d18; }

.modal-quick-links { margin-top: 10px; display: none; }
.modal-quick-links.show { display: flex; gap: 6px; flex-wrap: wrap; }
.modal-ql {
  flex: 1; min-width: 0; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  padding: 8px 6px; border-radius: 10px; font-size: 11px; font-weight: 500; font-family: inherit;
  text-decoration: none; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: var(--text-sub);
  transition: all 0.2s; white-space: nowrap; cursor: pointer;
}
.modal-ql:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.15); }
.modal-ql:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── Toast ── */
.toast-wrap {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 999;
  display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
}
.toast {
  background: rgba(28,28,46,0.95); color: #fff; font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: 20px; animation: toastIn 0.25s ease;
  display: flex; align-items: center; gap: 6px;
}
.toast.copied { color: #34d399; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Responsive ── */
@media (min-width: 640px) {
  .container { max-width: 600px; }
  .grid { gap: 12px; }
}

@media (min-width: 768px) {
  .container { max-width: 720px; padding: 32px 24px 48px; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .modal { border-radius: 24px; max-width: 560px; margin-bottom: 20vh; }
  .modal-overlay { align-items: center; }
}

@media (min-width: 1024px) {
  .container { max-width: 960px; }
  .grid { gap: 16px; }
  .card { padding: 22px 18px 18px; }
}

@media (min-width: 1440px) {
  .container { max-width: 1200px; }
  .grid { gap: 20px; }
  .card { padding: 24px 20px 20px; }
  .header-title { font-size: 26px; }
}
</style>
</head>

function addRecent(index) {
  try {
    const ids = getRecent().filter(id => id !== index);
    ids.unshift(index);
    localStorage.setItem(RECENT_KEY, JSON.stringify(ids.slice(0, MAX_RECENT)));
  } catch {}
}

function renderRecent() {
  const section = document.getElementById('recentSection');
  const recents = getRecent();
  if (recents.length === 0 || activeCat !== 'all' || searchQuery) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  section.innerHTML = `
    <div class="recent-label">最近使用</div>
    <div class="recent-row">
      ${recents.map(id => {
        const p = PROMPTS[id];
        return `<button class="recent-chip" data-index="${id}" aria-label="最近使用：${p.title}">
          <span class="rc-emoji">${p.emoji}</span>${p.title}
        </button>`;
      }).join('')}
    </div>
  `;
  section.querySelectorAll('.recent-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const p = PROMPTS[parseInt(chip.dataset.index)];
      openModal(p);
    });
  });
}

// ============ RENDER ============
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = CATEGORIES.map(c =>
    `<button class="tab${c.id === activeCat ? ' active' : ''}" data-cat="${c.id}" role="tab" aria-selected="${c.id === activeCat}">${c.name}</button>`
  ).join('');

  const wrap = document.getElementById('tabsWrap');
  requestAnimationFrame(() => {
    wrap.classList.toggle('scrollable', tabsEl.scrollWidth > tabsEl.clientWidth);
  });
}

function getFiltered() {
  let list = activeCat === 'all' ? [...PROMPTS] : PROMPTS.filter(p => p.cat === activeCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.cat.toLowerCase().includes(q)
    );
  }
  return list;
}

// Global search: returns matches across ALL categories
function getGlobalMatches() {
  if (!searchQuery) return [];
  const q = searchQuery.toLowerCase();
  return PROMPTS.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.desc.toLowerCase().includes(q) ||
    p.cat.toLowerCase().includes(q)
  );
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    const globalMatches = (activeCat !== 'all' && searchQuery) ? getGlobalMatches() : [];
    const catName = activeCat === 'all' ? '全部' : CATEGORIES.find(c => c.id === activeCat)?.name || '';
    const searchInfo = searchQuery ? `"${searchQuery}"` : '';
    const scopeInfo = activeCat !== 'all' ? `分类"${catName}"` : '全部模板';

    let actions = '';

    if (globalMatches.length > 0) {
      // In a category with search, no results here but found globally
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">${scopeInfo}中没有匹配${searchInfo}的模板</div>
        <div class="empty-hint">但在全部模板中找到了 ${globalMatches.length} 个结果</div>
        <div class="empty-actions">
          <button class="empty-btn accent" data-action="search-all">在全部模板中搜索${searchInfo}</button>
          <button class="empty-btn" data-action="clear-search">清空搜索</button>
        </div>
        <div class="empty-actions" style="margin-top:12px">
          <button class="empty-btn" data-action="custom-generate">✨ 自定义生成提示词</button>
        </div>
      </div>`;
    } else if (searchQuery && activeCat !== 'all') {
      actions = `<button class="empty-btn accent" data-action="search-all">在全部模板中搜索${searchInfo}</button>
                 <button class="empty-btn" data-action="clear-search">清空搜索</button>`;
    } else if (searchQuery) {
      actions = `<button class="empty-btn" data-action="clear-search">清空搜索</button>`;
    } else if (activeCat !== 'all') {
      actions = `<button class="empty-btn" data-action="view-all">查看全部模板</button>`;
    }

    if (!globalMatches.length) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">${scopeInfo}中没有匹配${searchInfo}的模板</div>
        <div class="empty-hint">试试调整筛选条件或搜索其他关键词</div>
        ${actions ? `<div class="empty-actions">${actions}</div>` : ''}
        <div class="empty-actions" style="margin-top:12px">
          <button class="empty-btn" data-action="custom-generate">✨ 自定义生成提示词</button>
        </div>
      </div>`;
    }

    bindEmptyActions(grid);
    return;
  }

  const cards = filtered.map((p, i) => {
    const idx = PROMPTS.indexOf(p);
    const inputsHint = p.inputs && p.inputs.length ? `<span class="card-inputs">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>${p.inputs.join('、')}
    </span>` : '';
    return `<button class="card" data-index="${idx}" style="animation: fadeUp 0.3s ease both; animation-delay:${i * 0.03}s" aria-label="${p.title} — 需要填写：${(p.inputs||[]).join('、')}">
      <span class="card-icon ${p.ic}">${p.emoji}</span>
      <span class="card-title">${p.title}</span>
      <span class="card-desc">${p.desc}</span>
      ${inputsHint}
    </button>`;
  }).join('');

  const customCard = activeCat === 'all' ? '' : `
    <button class="custom-card" id="customCard" aria-label="生成自定义指令">
      <span class="custom-icon">✨</span>
      <span>
        <span class="custom-title">生成自定义指令</span>
        <span class="custom-sub">输入你的需求，AI自动生成专属提示词</span>
      </span>
    </button>
  `;

  grid.innerHTML = cards + customCard;

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const p = PROMPTS[parseInt(card.dataset.index)];
      openModal(p);
    });
  });

  const cc = grid.querySelector('#customCard');
  if (cc) {
    cc.addEventListener('click', () => showToast('自定义指令功能开发中，敬请期待'));
  }
}

function bindEmptyActions(grid) {
  grid.querySelectorAll('.empty-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.action === 'clear-search') {
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        renderRecent();
        renderGrid();
      } else if (btn.dataset.action === 'view-all') {
        activeCat = 'all';
        renderTabs();
        renderRecent();
        renderGrid();
      } else if (btn.dataset.action === 'search-all') {
        activeCat = 'all';
        renderTabs();
        renderRecent();
        renderGrid();
      } else if (btn.dataset.action === 'custom-generate') {
        showToast('自定义指令功能开发中，敬请期待');
      }
    });
  });
}

// ============ MODAL ============
let currentPrompt = null;

function openModal(p) {
  currentPrompt = p;
  savedFocusEl = document.activeElement;

  // Track recent usage
  const idx = PROMPTS.indexOf(p);
  addRecent(idx);

  document.getElementById('modalIcon').className = 'modal-icon ' + p.ic;
  document.getElementById('modalIcon').textContent = p.emoji;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalPrompt').textContent = p.full;

  // Render input tags
  const inputsEl = document.getElementById('modalInputs');
  if (p.inputs && p.inputs.length) {
    inputsEl.innerHTML = `<span style="font-size:11px;color:var(--text-mute);margin-right:2px">需要填写：</span>` +
      p.inputs.map(inp => `<span class="modal-input-tag">${inp}</span>`).join('');
    inputsEl.style.display = 'flex';
  } else {
    inputsEl.style.display = 'none';
  }

  resetCopyBtn();

  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';

  // Focus the close button
  requestAnimationFrame(() => {
    document.getElementById('modalClose').focus();
  });

  document.addEventListener('keydown', modalKeyHandler);
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  currentPrompt = null;
  document.removeEventListener('keydown', modalKeyHandler);

  if (savedFocusEl && typeof savedFocusEl.focus === 'function') {
    savedFocusEl.focus();
    savedFocusEl = null;
  }

  // Refresh recent section
  renderRecent();
}

function modalKeyHandler(e) {
  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key === 'Tab') trapFocus(e);
}

function trapFocus(e) {
  const modal = document.querySelector('.modal');
  const focusable = modal.querySelectorAll('button:not([disabled]), [tabindex]:not([tabindex="-1"]), input, textarea, a[href]');
  if (focusable.length === 0) return;
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (e.shiftKey) {
    if (document.activeElement === first) { e.preventDefault(); last.focus(); }
  } else {
    if (document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('modalClose').addEventListener('click', closeModal);

document.getElementById('modalCopyBtn').addEventListener('click', () => {
  if (!currentPrompt) return;
  copyText(currentPrompt.full);
  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = '已复制 ✓';
  btn.classList.add('btn-copied');
  document.getElementById('modalQuickLinks').classList.add('show');
  setTimeout(resetCopyBtn, 3000);
});

function resetCopyBtn() {
  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = '复制完整提示词';
  btn.classList.remove('btn-copied');
  document.getElementById('modalQuickLinks').classList.remove('show');
}

// ============ COPY ============
function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板', true))
        .catch(() => fallbackCopy(text));
      return;
    }
  } catch(e) {}
  fallbackCopy(text);
}

function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) showToast('已复制到剪贴板', true);
    else showToast('复制失败，请手动选择文字');
  } catch(e) {
    showToast('复制失败，请手动选择文字');
  }
}

// ============ TOAST ============
function showToast(msg, success) {
  const el = document.createElement('div');
  el.className = 'toast' + (success ? ' copied' : '');
  if (success) {
    el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>${msg}`;
  } else {
    el.textContent = msg;
  }
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0'; el.style.transition = 'opacity 0.2s';
    setTimeout(() => el.remove(), 200);
  }, 2000);
}

// ============ EVENTS ============
document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeCat = tab.dataset.cat;
  renderTabs();
  renderRecent();
  renderGrid();
  tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
});

document.getElementById('tabs').addEventListener('keydown', (e) => {
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const idx = tabs.indexOf(document.activeElement);
  if (e.key === 'ArrowRight' && idx < tabs.length - 1) {
    e.preventDefault(); tabs[idx + 1].focus(); tabs[idx + 1].click();
  }
  if (e.key === 'ArrowLeft' && idx > 0) {
    e.preventDefault(); tabs[idx - 1].focus(); tabs[idx - 1].click();
  }
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderRecent();
  renderGrid();
});

window.addEventListener('resize', () => {
  const tabsEl = document.getElementById('tabs');
  const wrap = document.getElementById('tabsWrap');
  if (tabsEl && wrap) {
    wrap.classList.toggle('scrollable', tabsEl.scrollWidth > tabsEl.clientWidth);
  }
});

// ============ INIT ============
renderTabs();
renderRecent();
renderGrid();

requestAnimationFrame(() => {
  const tabsEl = document.getElementById('tabs');
  const wrap = document.getElementById('tabsWrap');
  wrap.classList.toggle('scrollable', tabsEl.scrollWidth > tabsEl.clientWidth);
});
</script>
</body>
</html>
