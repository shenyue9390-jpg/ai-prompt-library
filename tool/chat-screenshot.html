<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天截图生成器</title>
<style>
  :root {
    --primary:#ff6b35;
    --primary-light:#ff8f5e;
    --bg:#faf8f5;
    --bg-card:#ffffff;
    --text:#1a1410;
    --text-sub:#6b5e52;
    --text-mute:#a89a8e;
    --border:rgba(0,0,0,0.07);
    --radius:18px;
    --radius-sm:10px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans SC','PingFang SC',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 12px 60px;
  }
  .container{width:100%;max-width:420px;}

  /* header */
  .site-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:20px;
  }
  .site-header a{
    color:var(--primary);text-decoration:none;font-size:14px;font-weight:500;
  }
  .site-header a:hover{color:var(--primary-light);}
  .site-header h1{font-size:17px;font-weight:600;}

  /* form panel */
  .panel{
    background:var(--bg-card);border-radius:var(--radius);padding:18px;
    margin-bottom:16px;box-shadow:0 1px 4px var(--border);
  }
  .panel-title{
    font-size:13px;font-weight:600;color:var(--text-sub);
    margin-bottom:12px;letter-spacing:0.3px;
  }

  .field-group{display:flex;gap:10px;margin-bottom:10px;}
  .field-group .field{flex:1;}
  .field label{display:block;font-size:12px;color:var(--text-mute);margin-bottom:3px;}
  .field input,.field select{
    width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;
    font-size:13px;font-family:inherit;background:#faf8f5;color:var(--text);
    outline:none;transition:border .15s;
  }
  .field input:focus,.field select:focus{border-color:var(--primary);}
  input::placeholder{color:#ccc3ba;}

  /* msg row */
  .msg-row{
    display:flex;gap:8px;align-items:center;margin-bottom:8px;
    padding:8px 10px;background:#faf8f5;border-radius:var(--radius-sm);
    border:1px solid transparent;transition:border .15s;
  }
  .msg-row:focus-within{border-color:var(--primary);}
  .msg-tag{
    font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;
    white-space:nowrap;flex-shrink:0;
  }
  .msg-tag.other{background:#f0ebe6;color:#8c7a6b;}
  .msg-tag.me{background:#ff6b3515;color:var(--primary);}
  .msg-row input{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;color:var(--text);}
  .msg-row input::placeholder{color:#ccc3ba;}
  .msg-del{
    background:none;border:none;color:var(--text-mute);cursor:pointer;
    font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;
  }
  .msg-del:hover{color:#e85c3a;}

  .btn-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
    padding:7px 14px;border:none;border-radius:8px;font-size:13px;
    font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;
    white-space:nowrap;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-light);}
  .btn-outline{background:transparent;color:var(--text-sub);border:1px solid #e5ddd6;}
  .btn-outline:hover{background:#f5f0eb;border-color:#d5cbc0;}
  .btn-danger{background:#e85c3a10;color:#e85c3a;border:1px solid #e85c3a30;}
  .btn-danger:hover{background:#e85c3a20;}
  .btn-success{background:#67c23a15;color:#5fad2e;border:1px solid #67c23a40;}
  .btn-success:hover{background:#67c23a25;}

  /* phone frame */
  .phone-wrap{
    background:var(--bg-card);border-radius:var(--radius);padding:18px 12px 12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:16px;
  }
  .phone{
    background:#ededed;border-radius:22px;overflow:hidden;
    max-width:375px;margin:0 auto;position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 8px 30px rgba(0,0,0,0.1);
  }

  /* wechat header */
  .wx-header{
    background:#ededed;padding:10px 14px 8px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid #d6d6d6;
  }
  .wx-header .back{display:flex;align-items:center;gap:2px;font-size:14px;color:#181818;cursor:default;}
  .wx-header .back svg{width:22px;height:22px;}
  .wx-header .name{font-size:16px;font-weight:500;color:#181818;}
  .wx-header .menu{display:flex;gap:2px;cursor:default;}
  .wx-header .menu span{width:4px;height:4px;border-radius:50%;background:#181818;display:block;}

  /* status bar */
  .wx-status{
    background:#ededed;padding:6px 14px 2px;
    display:flex;justify-content:space-between;font-size:11px;color:#181818;
  }
  .wx-status .time{font-weight:600;}
  .wx-status .icons{display:flex;gap:4px;align-items:center;}
  .wx-status .icons svg{width:14px;height:14px;fill:#181818;}

  /* chat area */
  .wx-chat{
    background:#ededed;padding:10px 14px 14px;min-height:360px;max-height:500px;overflow-y:auto;
    display:flex;flex-direction:column;gap:2px;
  }
  .wx-chat::-webkit-scrollbar{width:3px;}
  .wx-chat::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:2px;}

  /* time label */
  .wx-time{
    text-align:center;font-size:11px;color:#999;margin:6px 0;padding:2px 8px;
    background:rgba(0,0,0,0.04);border-radius:4px;align-self:center;
  }

  /* avatar + name group */
  .wx-msg-group{margin-bottom:4px;}
  .wx-msg-other{display:flex;align-items:flex-start;gap:8px;margin-bottom:2px;}
  .wx-msg-me{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:8px;margin-bottom:2px;}

  .wx-avatar{
    width:38px;height:38px;border-radius:6px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:600;color:#fff;
  }

  .wx-bubble-wrap{max-width:72%;}
  .wx-name{font-size:11px;color:#999;margin-bottom:1px;padding-left:2px;}
  .wx-msg-me .wx-name{text-align:right;padding-right:2px;}

  .wx-bubble{
    padding:8px 12px;font-size:14px;line-height:1.5;word-break:break-word;
    position:relative;
  }
  .wx-bubble.other{
    background:#fff;color:#181818;border-radius:4px 12px 12px 12px;
  }
  .wx-bubble.me{
    background:#95ec69;color:#181818;border-radius:12px 4px 12px 12px;
  }

  /* image placeholder */
  .img-placeholder{
    background:#d0d0d0;border-radius:8px;overflow:hidden;cursor:default;
  }
  .img-placeholder svg{display:block;}

  /* bottom bar */
  .wx-bottom{
    background:#f7f7f7;padding:6px 14px;border-top:1px solid #d6d6d6;
    display:flex;align-items:center;gap:8px;
  }
  .wx-bottom .voice-btn,.wx-bottom .emoji-btn,.wx-bottom .plus-btn{
    width:26px;height:26px;border-radius:4px;background:#f0f0f0;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#666;cursor:default;flex-shrink:0;
  }
  .wx-bottom input{
    flex:1;height:30px;border:none;border-radius:4px;padding:0 8px;
    background:#fff;font-size:13px;font-family:inherit;outline:none;
  }
  .wx-bottom input::placeholder{color:#bbb;}

  /* meta bar */
  .meta-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0 6px;border-top:1px solid var(--border);margin-top:6px;
  }
  .meta-bar .count{font-size:12px;color:var(--text-mute);}

  /* empty state */
  .empty-chat{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:200px;color:#bbb;font-size:13px;gap:6px;
  }
  .empty-chat svg{opacity:0.3;}

  @media(max-width:440px){
    body{padding:14px 8px 40px;}
    .phone{border-radius:18px;}
  }
  [data-theme="dark"] {
    --bg: #13100e; --bg-card: #1f1a17; --text: #f5ede6;
    --text-sub: #d4c0b0; --text-mute: #9a8070; --border: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('tbox_theme')||'light')</script>
<div class="container">

  <!-- site header -->
  <div class="site-header">
    <a href="/" target="_top" style="display:inline-flex;align-items:center;gap:4px;color:var(--text-sub);text-decoration:none;font-size:14px;padding:6px 0;">← 返回首页</a>
    <h1>聊天截图</h1>
    <span style="width:50px;"></span>
  </div>

  <!-- input panel -->
  <div class="panel">
    <div class="panel-title">聊天设置</div>
    <div class="field-group">
      <div class="field">
        <label>对方昵称</label>
        <input id="otherName" value="张三" placeholder="对方昵称">
      </div>
      <div class="field">
        <label>我的昵称</label>
        <input id="myName" value="我" placeholder="我的昵称">
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="panel-title" style="margin-bottom:0;">消息列表</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline" onclick="addMsg('other')" style="font-size:12px;padding:4px 10px;">对方说</button>
        <button class="btn btn-outline" onclick="addMsg('me')" style="font-size:12px;padding:4px 10px;">我说</button>
        <button class="btn btn-outline" onclick="addTime()" style="font-size:12px;padding:4px 10px;">添加时间</button>
      </div>
    </div>

    <div id="msgList"></div>

    <div class="meta-bar">
      <span class="count">共 <span id="msgCount">0</span> 条消息</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-danger" onclick="clearAll()">清空</button>
        <button class="btn btn-success" onclick="capture()">📸 保存截图</button>
      </div>
    </div>
  </div>

  <!-- phone frame -->
  <div class="phone-wrap">
    <div class="phone" id="phone">
      <!-- status bar -->
      <div class="wx-status">
        <span class="time">9:41</span>
        <span class="icons">
          <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
        </span>
      </div>

      <!-- header -->
      <div class="wx-header">
        <div class="back">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
          返回
        </div>
        <div class="name" id="headerName">张三</div>
        <div class="menu"><span></span><span></span><span></span></div>
      </div>

      <!-- chat area -->
      <div class="wx-chat" id="chatArea">
        <div class="empty-chat" id="emptyChat">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="#ccc"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
          <span>点击「对方说」或「我说」添加消息</span>
        </div>
      </div>

      <!-- bottom bar -->
      <div class="wx-bottom">
        <div class="voice-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#666"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        </div>
        <input placeholder="输入消息" disabled>
        <div class="emoji-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#666"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        </div>
        <div class="plus-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#666"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ---- state ----
let messages = [];
let msgIdCounter = 0;

const COLORS = [
  '#5B8FF9','#F46649','#30BF78','#FF9845','#7B61FF','#F7B731','#36B3C8','#E868A8',
  '#5AD8A6','#FF6B35','#2069E0','#E85C3A','#3DC27D','#FF8F5E','#6F4CE0','#D48900'
];

function nameColor(name){
  let h=0;
  for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))|0;
  return COLORS[Math.abs(h)%COLORS.length];
}
function initials(name){return name.trim().charAt(0).toUpperCase()||'?'}

// ---- render messages ----
function render(){
  const chat=document.getElementById('chatArea');
  const empty=document.getElementById('emptyChat');
  const hdr=document.getElementById('headerName');
  const otherName=document.getElementById('otherName').value.trim()||'对方';
  const myName=document.getElementById('myName').value.trim()||'我';
  hdr.textContent=otherName;
  document.getElementById('msgCount').textContent=messages.filter(m=>m.type==='msg').length;

  // collect rendered nodes
  const rendered=[];

  // filter out empty msg placeholders
  let showEmpty=true;

  for(const m of messages){
    if(m.type==='msg'){
      if(m.text.trim()==='')continue;
      showEmpty=false;
      const isMe=m.side==='me';
      const group=document.createElement('div');
      group.className='wx-msg-group';

      const row=document.createElement('div');
      row.className=isMe?'wx-msg-me':'wx-msg-other';

      // avatar
      const ava=document.createElement('div');
      ava.className='wx-avatar';
      const nm=isMe?myName:otherName;
      ava.style.background=nameColor(nm);
      ava.textContent=initials(nm);
      row.appendChild(ava);

      // bubble wrap
      const wrap=document.createElement('div');
      wrap.className='wx-bubble-wrap';

      // name label
      const label=document.createElement('div');
      label.className='wx-name';
      label.textContent=nm;
      if(isMe&&myName==='我')label.textContent='';

      wrap.appendChild(label);

      // bubble
      const bubble=document.createElement('div');
      bubble.className='wx-bubble '+(isMe?'me':'other');
      bubble.textContent=m.text;
      wrap.appendChild(bubble);

      row.appendChild(wrap);
      group.appendChild(row);
      rendered.push(group);
    }else if(m.type==='time'){
      showEmpty=false;
      const t=document.createElement('div');
      t.className='wx-time';
      t.textContent=m.text;
      rendered.push(t);
    }
  }

  chat.innerHTML='';
  if(showEmpty){
    chat.appendChild(empty);
  }else{
    for(const el of rendered)chat.appendChild(el);
    chat.scrollTop=chat.scrollHeight;
  }
}

// ---- add / remove messages ----
function addMsg(side){
  const otherName=document.getElementById('otherName').value.trim()||'对方';
  const msgId='msg_'+(++msgIdCounter);

  // insert before any time that follows
  const idx=messages.length;
  messages.splice(idx,0,{id:msgId,type:'msg',side,text:''});

  renderMsgList();
  render();

  // focus the new input
  setTimeout(()=>{
    const inp=document.getElementById('inp_'+msgId);
    if(inp)inp.focus();
  },50);
}

function addTime(){
  messages.push({id:'time_'+(++msgIdCounter),type:'time',text:'上午 12:00'});
  renderMsgList();
  render();
}

function delMsg(id){
  messages=messages.filter(m=>m.id!==id);
  renderMsgList();
  render();
}

function updateMsg(id,val){
  const m=messages.find(x=>x.id===id);
  if(m)m.text=val;
  render();
}

function updateTime(id,val){
  const m=messages.find(x=>x.id===id);
  if(m)m.text=val;
  render();
}

// ---- render msg list form ----
function renderMsgList(){
  const el=document.getElementById('msgList');
  el.innerHTML='';
  for(const m of messages){
    if(m.type==='msg'){
      const row=document.createElement('div');
      row.className='msg-row';
      const tag=document.createElement('span');
      tag.className='msg-tag '+(m.side==='me'?'me':'other');
      tag.textContent=m.side==='me'?'我说':'对方说';
      row.appendChild(tag);
      const inp=document.createElement('input');
      inp.id='inp_'+m.id;
      inp.type='text';
      inp.placeholder='输入消息内容...';
      inp.value=m.text;
      inp.addEventListener('input',()=>updateMsg(m.id,inp.value));
      row.appendChild(inp);
      const del=document.createElement('button');
      del.className='msg-del';
      del.textContent='×';
      del.addEventListener('click',()=>delMsg(m.id));
      row.appendChild(del);
      el.appendChild(row);
    }else{
      const row=document.createElement('div');
      row.className='msg-row';
      const tag=document.createElement('span');
      tag.className='msg-tag';
      tag.textContent='时间';
      tag.style.background='#f0ebe6';tag.style.color='#8c7a6b';
      row.appendChild(tag);
      const inp=document.createElement('input');
      inp.type='text';
      inp.placeholder='时间文本，如 "下午 3:00"';
      inp.value=m.text;
      inp.addEventListener('input',()=>updateTime(m.id,inp.value));
      row.appendChild(inp);
      const del=document.createElement('button');
      del.className='msg-del';
      del.textContent='×';
      del.addEventListener('click',()=>delMsg(m.id));
      row.appendChild(del);
      el.appendChild(row);
    }
  }
  document.getElementById('msgCount').textContent=messages.filter(m=>m.type==='msg').length;
}

// ---- clear ----
function clearAll(){
  if(messages.length>0&&!confirm('确定清空所有消息？'))return;
  messages=[];
  msgIdCounter=0;
  renderMsgList();
  render();
}

// ---- update header on name change ----
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('otherName').addEventListener('input',render);
  document.getElementById('myName').addEventListener('input',render);
  renderMsgList();
  render();
});

// ---- capture ----
function capture(){
  const phone=document.getElementById('phone');
  // temporarily increase chat max-height for full capture
  const chat=document.getElementById('chatArea');
  const origMaxH=chat.style.maxHeight;
  const origOverflow=chat.style.overflow;
  chat.style.maxHeight='none';
  chat.style.overflow='visible';

  // Use html2canvas via CDN
  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  script.onload=function(){
    html2canvas(phone,{
      scale:2,
      backgroundColor:'#ededed',
      useCORS:true,
      logging:false,
      allowTaint:false
    }).then(canvas=>{
      chat.style.maxHeight=origMaxH;
      chat.style.overflow=origOverflow;
      const link=document.createElement('a');
      link.download='chat-screenshot.png';
      link.href=canvas.toDataURL('image/png');
      link.click();
    }).catch(()=>{
      chat.style.maxHeight=origMaxH;
      chat.style.overflow=origOverflow;
      alert('截图生成失败，请尝试手动截图。');
    });
  };
  script.onerror=function(){
    chat.style.maxHeight=origMaxH;
    chat.style.overflow=origOverflow;
    alert('无法加载截图库，请手动截图（Command+Shift+S）。');
    // fallback: tell user to screenshot
  };
  document.body.appendChild(script);
}
</script>
</body>
</html>
