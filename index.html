<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="吉他助手">
<title>吉他助手</title>
<style>
:root {
  --bg: #0a0a0c;
  --card: #1a1a1e;
  --card2: #222228;
  --text: #f0f0f2;
  --text2: #888890;
  --accent: #e6864a;
  --accent2: #f5a623;
  --border: #2a2a30;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
  --tab-bg: rgba(10,10,12,0.96);
  --success: #4cd964;
  --warning: #f5a623;
  --danger: #ff453a;
  --blue: #5e8fcc;
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
button, input { -webkit-appearance: none; appearance: none; font-family: inherit; }
button, .tab, .chord-item, .tab-song-item {
  cursor: pointer; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
html, body { height:100%; overflow:hidden; touch-action: manipulation; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.app {
  width: 100%;
  max-width: 430px;
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* Header */
.header {
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.streak-badge {
  display: flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, #e6864a, #f5a623); color: #fff;
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  box-shadow: 0 2px 8px rgba(230,134,74,0.3);
}
.streak-badge .fire { font-size: 18px; }

/* Main content area */
.main { flex:1; overflow-y:auto; padding: 0 16px 20px; -webkit-overflow-scrolling:touch; }
.page { display:none; }
.page.active { display:block; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  border: 0.5px solid var(--border);
}
.card-title {
  font-size: 12px; color: var(--text2); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 12px; font-weight: 700;
}

/* Timer */
.timer-display {
  text-align: center; padding: 20px 0;
}
.timer-display .time {
  font-size: 64px; font-weight: 200; font-variant-numeric: tabular-nums;
  letter-spacing: -2px; line-height: 1; color: #f0f0f2;
}
.timer-display .label {
  font-size: 15px; color: var(--text2); margin-top: 6px;
}
.timer-presets {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.timer-presets button {
  flex:1; min-width: 60px; padding: 11px 6px;
  border: 0.5px solid var(--border); border-radius: 22px;
  background: var(--card2); color: var(--text);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.timer-presets button.active {
  background: linear-gradient(135deg, #e6864a, #f5a623); color: #fff;
  border-color: transparent; box-shadow: 0 2px 8px rgba(230,134,74,0.35);
}
.timer-presets .custom-input {
  width: 70px; padding: 10px 6px; border: 1.5px solid var(--border);
  border-radius: 22px; font-size: 14px; text-align: center;
  background: var(--card); color: var(--text);
}
.timer-controls {
  display: flex; gap: 10px; justify-content: center;
}
.btn {
  padding: 13px 28px; border-radius: 26px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.3px;
}
.btn-primary {
  background: linear-gradient(135deg, #e6864a, #f5a623); color: #fff;
  box-shadow: 0 4px 14px rgba(230,134,74,0.3);
}
.btn-outline { background: transparent; border: 0.5px solid var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.btn:active { transform: scale(0.96); opacity: 0.8; }

/* Calendar heatmap */
.calendar { display: flex; gap: 4px; flex-wrap: wrap; }
.calendar .day {
  width: 30px; height: 30px; border-radius: 6px;
  font-size: 11px; display: flex; align-items: center; justify-content: center;
  background: var(--border); color: var(--text2);
}
.calendar .day.done { background: var(--accent); color: #fff; font-weight: 600; }
.calendar .day.today { box-shadow: 0 0 0 2px var(--accent); }

/* Tab list */
.tab-search-wrap {
  position: relative; margin-bottom: 12px;
}
.tab-search {
  width: 100%; padding: 11px 16px 11px 36px; border-radius: 22px;
  border: 0.5px solid var(--border); background: var(--card2); color: var(--text);
  font-size: 15px; outline: none; transition: all 0.2s;
  -webkit-appearance: none;
}
.tab-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,134,74,0.15); }
.tab-search::placeholder { color: var(--text2); }
.tab-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none;
}
.tab-categories { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
.tab-categories button {
  padding: 8px 16px; border-radius: 18px; border: 0.5px solid var(--border);
  background: var(--card); color: var(--text); font-size: 14px;
  white-space: nowrap; cursor: pointer; font-weight: 600;
}
.tab-categories button.active { background: linear-gradient(135deg, #e6864a, #f5a623); color: #fff; border-color: transparent; }
.tab-song-list { display: flex; flex-direction: column; gap: 8px; }
.tab-song-item {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; border: 0.5px solid var(--border); display: flex;
  justify-content: space-between; align-items: center;
  transition: all 0.15s;
}
.tab-song-item:active { transform: scale(0.98); background: var(--card2); }
.tab-song-item .song-info { flex:1; }
.tab-song-item .song-title { font-size: 16px; font-weight: 600; }
.tab-song-item .song-artist { font-size: 13px; color: var(--text2); margin-top: 2px; }
.tab-song-item .song-diff {
  font-size: 11px; padding: 3px 8px; border-radius: 10px;
  font-weight: 600;
}
.diff-1 { background: #34c75920; color: #34c759; }
.diff-2 { background: #ff950020; color: #ff9500; }
.diff-3 { background: #ff6b3520; color: #ff6b35; }
.diff-4 { background: #ff3b3020; color: #ff3b30; }

.tab-viewer {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  border: 0.5px solid var(--border); margin-bottom: 14px;
}
.tab-viewer .tab-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.tab-viewer .tab-header .title { font-size: 20px; font-weight: 700; }
.tab-viewer .tab-header .artist { font-size: 14px; color: var(--text2); }
.tab-viewer .tab-meta {
  display: flex; gap: 10px; margin: 8px 0 12px; font-size: 12px; color: var(--text2);
}
.tab-viewer .tab-tips {
  background: var(--card2); border-radius: 10px; padding: 14px;
  font-size: 13px; color: var(--accent2); margin-bottom: 14px; line-height: 1.7;
  border-left: 3px solid var(--accent);
}
.tab-canvas-wrap {
  background: var(--card); border-radius: var(--radius-sm);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 4px;
}
.tab-back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 16px; border-radius: 18px; border: 0.5px solid var(--border);
  background: var(--card2); color: var(--text); font-size: 14px;
  cursor: pointer; margin-bottom: 12px; font-weight: 600;
}

/* Chord list */
.chord-categories { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
.chord-categories button {
  padding: 8px 16px; border-radius: 18px; border: 0.5px solid var(--border);
  background: var(--card); color: var(--text); font-size: 14px;
  white-space: nowrap; cursor: pointer;
}
.chord-categories button.active { background: linear-gradient(135deg, #e6864a, #f5a623); color: #fff; border-color: transparent; }
.chord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.chord-item {
  background: var(--card); border-radius: var(--radius); padding: 12px 8px;
  text-align: center; cursor: pointer; border: 0.5px solid var(--border);
  transition: all 0.15s;
}
.chord-item:active { transform: scale(0.95); }
.chord-item .name { font-size: 16px; font-weight: 600; margin-top: 4px; }
.chord-item svg { width: 100%; max-width: 100px; height: auto; }

/* Chord detail modal */
.modal {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.5); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s;
}
.modal.hidden { display:none; }
.modal-content {
  background: var(--card); border-radius: 20px; padding: 24px;
  width: 85%; max-width: 340px; text-align: center;
  border: 0.5px solid var(--border);
}
.modal-content svg { width: 180px; height: auto; }
.modal-content .chord-name { font-size: 28px; font-weight: 700; margin: 10px 0; }
.modal-close {
  margin-top: 16px; padding: 12px 36px; border-radius: 24px;
  border: 0.5px solid var(--border); background: var(--card2); color: var(--text);
  font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
}

/* Metronome */
.bpm-display {
  text-align: center; font-size: 72px; font-weight: 200; letter-spacing: -2px;
  line-height: 1; margin: 10px 0;
}
.bpm-label { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
.bpm-controls { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 12px 0; }
.bpm-btn {
  width: 44px; height: 44px; border-radius: 22px; border: 0.5px solid var(--border);
  background: var(--card2); color: var(--text); font-size: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.bpm-slider { flex:1; accent-color: var(--accent); height: 6px; }
.time-sig { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
.time-sig button {
  padding: 8px 18px; border-radius: 18px; border: 0.5px solid var(--border);
  background: var(--card2); color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer;
}
.time-sig button.active { background: var(--blue); color: #fff; border-color: transparent; }
.beat-indicator {
  display: flex; gap: 8px; justify-content: center; margin: 16px 0;
}
.beat-dot {
  width: 16px; height: 16px; border-radius: 8px;
  background: var(--border); transition: all 0.1s;
}
.beat-dot.active { background: var(--accent); transform: scale(1.4); }
.beat-dot.accent { background: var(--blue); }

/* Stats */
.stat-row { display: flex; gap: 10px; margin-bottom: 10px; }
.stat-card {
  flex:1; background: var(--card); border-radius: var(--radius);
  padding: 16px; text-align: center; border: 0.5px solid var(--border);
}
.stat-card .num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-card .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
.goal-progress {
  height: 8px; background: var(--border); border-radius: 4px; margin-top: 8px; overflow: hidden;
}
.goal-progress .fill {
  height: 100%; background: var(--accent); border-radius: 4px;
  transition: width 0.3s;
}
.record-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.record-item:last-child { border-bottom: none; }
.record-date { font-size: 15px; font-weight: 500; }
.record-dur { font-size: 14px; color: var(--text2); }
.goal-inputs { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.goal-inputs input {
  width: 56px; padding: 8px; border-radius: 10px; border: 1px solid var(--border);
  text-align: center; font-size: 16px; background: var(--card); color: var(--text);
}
.goal-inputs span { font-size: 14px; color: var(--text2); }

/* Tab bar */
.tab-bar {
  display: flex; background: var(--tab-bg);
  border-top: 0.5px solid var(--border);
  padding: 4px 0 env(safe-area-inset-bottom, 4px);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
}
.tab {
  flex:1; display: flex; flex-direction: column; align-items: center;
  padding: 6px 0; cursor: pointer; color: var(--text2);
  font-size: 10px; font-weight: 500; gap: 3px;
  transition: color 0.15s; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.tab .icon { font-size: 22px; }
.tab.active { color: var(--accent); }

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.pulse { animation: pulse 1s infinite; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎸 吉他助手</h1>
    <div class="streak-badge" id="streakBadge">
      <span class="fire">🔥</span><span id="streakCount">0</span>天
    </div>
  </div>

  <div class="main" id="mainContent">
    <!-- Page 1: Timer & Check-in -->
    <div class="page active" id="page-timer">
      <div class="card">
        <div class="card-title">📅 今日练习</div>
        <div class="timer-display">
          <div class="time" id="timerDisplay">00:00</div>
          <div class="label" id="timerLabel">选择时长开始练习</div>
        </div>
        <div class="timer-presets" id="timerPresets">
          <button data-min="15">15分钟</button>
          <button data-min="30">30分钟</button>
          <button data-min="45">45分钟</button>
          <button data-min="60">60分钟</button>
          <input type="number" class="custom-input" id="customMin" placeholder="自定义" min="1" max="180">
        </div>
        <div class="timer-controls">
          <button class="btn btn-outline hidden" id="btnPause">暂停</button>
          <button class="btn btn-primary" id="btnStart">开始练习</button>
          <button class="btn btn-danger hidden" id="btnStop">结束</button>
        </div>
        <div style="text-align:center;margin-top:10px;font-size:14px;color:var(--text2)" id="todayStatus"></div>
      </div>

      <div class="card">
        <div class="card-title">📊 本月打卡 · <span id="monthLabel"></span></div>
        <div class="calendar" id="calendar"></div>
      </div>
    </div>

    <!-- Page 2: Chords -->
    <div class="page" id="page-chords">
      <div class="chord-categories" id="chordCats"></div>
      <div class="chord-grid" id="chordGrid"></div>
    </div>

    <!-- Page 3: Metronome -->
    <div class="page" id="page-metronome">
      <div class="card">
        <div class="card-title">🥁 节拍器</div>
        <div class="bpm-display" id="bpmDisplay">120</div>
        <div class="bpm-label" style="text-align:center">BPM</div>
        <div class="bpm-controls">
          <button class="bpm-btn" id="bpmDown">−</button>
          <input type="range" class="bpm-slider" id="bpmSlider" min="40" max="208" value="120">
          <button class="bpm-btn" id="bpmUp">+</button>
        </div>
        <div class="time-sig" id="timeSig">
          <button data-beats="2">2/4</button>
          <button data-beats="3">3/4</button>
          <button data-beats="4" class="active">4/4</button>
          <button data-beats="6">6/8</button>
        </div>
        <div class="beat-indicator" id="beatIndicator"></div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="btnMetronome">▶ 开始</button>
        </div>
        <div style="text-align:center;margin-top:8px;font-size:32px;font-weight:200;height:40px" id="beatCount"></div>
      </div>
    </div>

    <!-- Page 4: Stats & Plan -->
    <div class="page" id="page-stats">
      <div class="stat-row">
        <div class="stat-card">
          <div class="num" id="statDays">0</div>
          <div class="lbl">累计练习天数</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statMinutes">0</div>
          <div class="lbl">累计练习分钟</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="num" id="statAvg">0</div>
          <div class="lbl">平均每次(分钟)</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statBest">0</div>
          <div class="lbl">最长连续打卡</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎯 每周目标</div>
        <div style="font-size:14px;margin-bottom:6px">
          目标：每周 <strong id="goalDays">5</strong> 天，每天 <strong id="goalMins">30</strong> 分钟
        </div>
        <div class="goal-progress"><div class="fill" id="goalBar" style="width:0%"></div></div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px" id="goalText">本周 0/5 天</div>
        <div class="goal-inputs">
          <span>修改目标：</span>
          <input type="number" id="editGoalDays" value="5" min="1" max="7">
          <span>天/周</span>
          <input type="number" id="editGoalMins" value="30" min="5" max="180" step="5">
          <span>分钟/天</span>
          <button class="btn btn-outline" id="btnSaveGoal" style="padding:8px 14px;font-size:14px">保存</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 最近练习</div>
        <div id="recentRecords"><div style="color:var(--text2);text-align:center;padding:20px">还没有练习记录</div></div>
      </div>
    </div>

    <!-- Page 5: Tabs -->
    <div class="page" id="page-tabs">
      <div id="tabListView">
        <div class="tab-search-wrap">
          <input type="text" class="tab-search" id="tabSearch" placeholder="搜索曲名或歌手...">
          <span class="tab-search-icon">🔍</span>
        </div>
        <div class="tab-categories" id="tabCats"></div>
        <div class="tab-song-list" id="tabSongList"></div>
        <div style="text-align:center;padding:20px;color:var(--text2);display:none" id="tabNoResult">没有找到匹配的乐谱</div>
      </div>
      <div id="tabDetailView" class="hidden">
        <button class="tab-back-btn" id="tabBackBtn">← 返回列表</button>
        <div class="tab-viewer">
          <div class="tab-header">
            <div>
              <div class="title" id="tabDetailTitle"></div>
              <div class="artist" id="tabDetailArtist"></div>
            </div>
            <span class="song-diff" id="tabDetailDiff"></span>
          </div>
          <div class="tab-meta">
            <span id="tabDetailKey"></span>
          </div>
          <div class="tab-tips" id="tabDetailTips"></div>
          <div class="tab-canvas-wrap">
            <canvas id="tabDetailCanvas" style="display:block;height:auto;"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-page="timer">
      <span class="icon">⏱️</span><span>练习</span>
    </div>
    <div class="tab" data-page="chords">
      <span class="icon">🎼</span><span>和弦</span>
    </div>
    <div class="tab" data-page="metronome">
      <span class="icon">🥁</span><span>节拍</span>
    </div>
    <div class="tab" data-page="stats">
      <span class="icon">📈</span><span>统计</span>
    </div>
    <div class="tab" data-page="tabs">
      <span class="icon">📜</span><span>乐谱</span>
    </div>
  </div>
</div>

<div class="modal hidden" id="chordModal">
  <div class="modal-content">
    <div id="chordDetailSvg"></div>
    <div class="chord-name" id="chordDetailName"></div>
    <div style="font-size:14px;color:var(--text2)" id="chordDetailInfo"></div>
    <button class="modal-close" onclick="document.getElementById('chordModal').classList.add('hidden')">关闭</button>
  </div>
</div>

<script>
// ==================== DATA LAYER ====================
const STORAGE_KEY = 'guitar_helper_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    records: [],
    weeklyGoal: { days: 5, minutes: 30 },
    currentStreak: 0,
    bestStreak: 0
  };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let appData = loadData();

// Fix data format
if (!appData.records) appData.records = [];
if (!appData.weeklyGoal) appData.weeklyGoal = { days: 5, minutes: 30 };
if (!appData.bestStreak) appData.bestStreak = 0;
if (typeof appData.currentStreak !== 'number') appData.currentStreak = 0;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getTodayRecord() {
  const ts = todayStr();
  return appData.records.find(r => r.date === ts);
}

function saveTodayRecord(durationSeconds) {
  const ts = todayStr();
  const existing = appData.records.find(r => r.date === ts);
  if (existing) {
    existing.duration += durationSeconds;
  } else {
    appData.records.push({ date: ts, duration: durationSeconds });
  }
  recalcStreak();
  saveData(appData);
}

function recalcStreak() {
  const dates = [...new Set(appData.records.map(r => r.date))].sort().reverse();
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);

  for (let i = 0; i < dates.length; i++) {
    const d = new Date(dates[i]);
    d.setHours(0,0,0,0);
    const expected = new Date(today);
    expected.setDate(expected.getDate() - i);
    expected.setHours(0,0,0,0);
    if (d.getTime() === expected.getTime()) {
      streak++;
    } else {
      break;
    }
  }
  appData.currentStreak = streak;
  if (streak > appData.bestStreak) appData.bestStreak = streak;
  saveData(appData);
}

recalcStreak();

// ==================== TIMER MODULE ====================
let timerState = {
  targetSeconds: 0,
  elapsedSeconds: 0,
  remainingSeconds: 0,
  intervalId: null,
  mode: 'idle', // idle | countdown | stopwatch | paused
};

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateTimerDisplay() {
  const display = document.getElementById('timerDisplay');
  const label = document.getElementById('timerLabel');
  if (timerState.mode === 'countdown' || timerState.mode === 'paused') {
    display.textContent = formatTime(timerState.remainingSeconds);
    label.textContent = '剩余时间';
  } else if (timerState.mode === 'stopwatch') {
    display.textContent = formatTime(timerState.elapsedSeconds);
    label.textContent = '已练习时间';
  } else {
    display.textContent = '00:00';
    label.textContent = '选择时长开始练习';
  }
}

function stopTimer() {
  if (timerState.intervalId) clearInterval(timerState.intervalId);
  timerState.intervalId = null;
}

function resetTimerUI() {
  document.getElementById('btnStart').textContent = '开始练习';
  document.getElementById('btnStart').classList.remove('hidden');
  document.getElementById('btnPause').classList.add('hidden');
  document.getElementById('btnStop').classList.add('hidden');
  document.getElementById('timerPresets').style.opacity = '1';
  document.getElementById('timerPresets').style.pointerEvents = 'auto';
}

function onTimerTick() {
  if (timerState.mode === 'countdown') {
    timerState.remainingSeconds--;
    timerState.elapsedSeconds++;
    updateTimerDisplay();
    if (timerState.remainingSeconds <= 0) {
      finishPractice();
    }
  } else if (timerState.mode === 'stopwatch') {
    timerState.elapsedSeconds++;
    updateTimerDisplay();
  }
}

function finishPractice() {
  stopTimer();
  const seconds = timerState.elapsedSeconds;
  if (seconds >= 60) {
    saveTodayRecord(seconds);
    alert('🎉 练习完成！本次练习 ' + formatTime(seconds) + '，已自动打卡。');
  } else if (seconds > 0) {
    alert('练习时间太短（不到1分钟），不计入打卡。');
  }
  timerState.mode = 'idle';
  timerState.elapsedSeconds = 0;
  timerState.remainingSeconds = 0;
  timerState.targetSeconds = 0;
  updateTimerDisplay();
  resetTimerUI();
  renderTimerPage();
  updateStreakBadge();
}

document.getElementById('btnStart').addEventListener('click', () => {
  if (timerState.mode === 'paused') {
    // Resume
    timerState.mode = timerState.targetSeconds > 0 ? 'countdown' : 'stopwatch';
    timerState.intervalId = setInterval(onTimerTick, 1000);
    document.getElementById('btnStart').textContent = '练习中...';
    document.getElementById('btnPause').classList.remove('hidden');
    document.getElementById('btnPause').textContent = '暂停';
    return;
  }

  const selectedPreset = document.querySelector('#timerPresets button.active');
  const customVal = parseInt(document.getElementById('customMin').value);
  let targetMin = 0;
  if (selectedPreset) {
    targetMin = parseInt(selectedPreset.dataset.min);
  } else if (customVal > 0) {
    targetMin = customVal;
  }

  timerState.elapsedSeconds = 0;
  timerState.targetSeconds = targetMin * 60;
  timerState.remainingSeconds = timerState.targetSeconds;
  timerState.mode = targetMin > 0 ? 'countdown' : 'stopwatch';
  timerState.intervalId = setInterval(onTimerTick, 1000);

  document.getElementById('btnStart').textContent = '练习中...';
  document.getElementById('btnPause').classList.remove('hidden');
  document.getElementById('btnStop').classList.remove('hidden');
  document.getElementById('timerPresets').style.opacity = '0.5';
  document.getElementById('timerPresets').style.pointerEvents = 'none';
  updateTimerDisplay();
  document.getElementById('todayStatus').textContent = '⏳ 练习进行中...';
});

document.getElementById('btnPause').addEventListener('click', () => {
  stopTimer();
  timerState.mode = 'paused';
  document.getElementById('btnStart').textContent = '继续练习';
  document.getElementById('btnPause').textContent = '已暂停';
  document.getElementById('todayStatus').textContent = '⏸️ 已暂停';
});

document.getElementById('btnStop').addEventListener('click', () => {
  const seconds = timerState.elapsedSeconds;
  stopTimer();
  if (seconds >= 60) {
    saveTodayRecord(seconds);
  }
  timerState.mode = 'idle';
  timerState.elapsedSeconds = 0;
  timerState.remainingSeconds = 0;
  timerState.targetSeconds = 0;
  updateTimerDisplay();
  resetTimerUI();
  document.getElementById('todayStatus').textContent = seconds >= 60 ? '✅ 已打卡 ' + formatTime(seconds) : '未记录（不足1分钟）';
  renderTimerPage();
  updateStreakBadge();
});

function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  document.getElementById('monthLabel').textContent = year + '年' + (month+1) + '月';
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = todayStr();

  const practicedDates = new Set(appData.records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear() === year && d.getMonth() === month && r.duration >= 60;
  }).map(r => r.date));

  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';
  // Day headers
  const headerDays = ['一','二','三','四','五','六','日'];
  headerDays.forEach(d => {
    const el = document.createElement('div');
    el.style.cssText = 'width:30px;height:20px;font-size:10px;text-align:center;color:var(--text2)';
    el.textContent = d;
    calendar.appendChild(el);
  });
  // Pad start
  const firstDay = new Date(year, month, 1).getDay();
  const pad = firstDay === 0 ? 6 : firstDay - 1;
  for (let i = 0; i < pad; i++) {
    const el = document.createElement('div');
    el.style.cssText = 'width:30px;height:30px';
    calendar.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const el = document.createElement('div');
    el.className = 'day';
    el.textContent = d;
    if (practicedDates.has(dateStr)) el.classList.add('done');
    if (dateStr === today) el.classList.add('today');
    calendar.appendChild(el);
  }
}

function renderTimerPage() {
  renderCalendar();
  updateStreakBadge();
  const todayRec = getTodayRecord();
  const status = document.getElementById('todayStatus');
  if (timerState.mode === 'idle') {
    status.textContent = todayRec ? '✅ 今日已打卡 ' + formatTime(todayRec.duration) : '今天还没有练习哦';
  }
}

function drawChordSVG(chord) {
  const w = 120, h = 150;
  const left = 28, top = 24, stringSpacing = 16, fretSpacing = 20;
  const strings = chord.strings;
  const fingers = chord.fingers || [];
  const barre = chord.barre;

  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;

  // Fret lines
  for (let f = 0; f <= 5; f++) {
    const y = top + f * fretSpacing;
    svg += `<line x1="${left}" y1="${y}" x2="${left + 5*stringSpacing}" y2="${y}" stroke="#777" stroke-width="${f===0?2:0.8}" opacity="${f===0?1:0.5}"/>`;
  }

  // String lines
  for (let s = 0; s < 6; s++) {
    const x = left + s * stringSpacing;
    svg += `<line x1="${x}" y1="${top}" x2="${x}" y2="${top + 5*fretSpacing}" stroke="#aaa" stroke-width="${1.2}" opacity="0.8"/>`;
  }

  // String markers (x/o)
  for (let s = 0; s < 6; s++) {
    const val = strings[s];
    const x = left + s * stringSpacing;
    if (val === 'x') {
      svg += `<text x="${x}" y="${top-8}" text-anchor="middle" font-size="11" fill="#aaa">✕</text>`;
    } else if (val === 0) {
      svg += `<circle cx="${x}" cy="${top-8}" r="5" fill="none" stroke="#aaa" stroke-width="1"/>`;
    }
  }

  // Barre
  if (barre) {
    const x1 = left + (barre.from - 1) * stringSpacing;
    const x2 = left + (barre.to - 1) * stringSpacing;
    const y = top + (barre.fret - 0.5) * fretSpacing;
    svg += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#fff" stroke-width="12" stroke-linecap="round" opacity="0.85"/>`;
    svg += `<text x="${(x1+x2)/2}" y="${y+4}" text-anchor="middle" font-size="9" fill="#1c1c1e" font-weight="700">1</text>`;
  }

  // Finger dots
  for (let s = 0; s < 6; s++) {
    const val = strings[s];
    if (val === 'x' || val === 0 || val === undefined) continue;
    const fret = parseInt(val);
    if (isNaN(fret)) continue;
    const x = left + s * stringSpacing;
    const y = top + (fret - 0.5) * fretSpacing;
    // Skip if covered by barre
    if (barre && fret === barre.fret && s+1 >= barre.from && s+1 <= barre.to) continue;
    svg += `<circle cx="${x}" cy="${y}" r="8" fill="#fff" opacity="0.9"/>`;
    if (fingers[s]) {
      svg += `<text x="${x}" y="${y+4}" text-anchor="middle" font-size="9" fill="#1c1c1e" font-weight="700">${fingers[s]}</text>`;
    }
  }

  // Fret number (only show for chords above 2nd fret that have no open strings)
  const playedFrets = strings.filter(s => typeof s === 'number' && s > 0);
  const hasOpenStrings = strings.some(s => s === 0);
  const minFret = playedFrets.length > 0 ? Math.min(...playedFrets) : 1;
  if (minFret > 2 && !hasOpenStrings) {
    svg += `<text x="${left-12}" y="${top + 4}" font-size="10" fill="#aaa">${minFret}fr</text>`;
  }

  svg += '</svg>';
  return svg;
}

// ==================== METRONOME MODULE ====================
let metronome = {
  running: false,
  bpm: 120,
  beatsPerMeasure: 4,
  currentBeat: 0,
  nextBeatTime: 0,
  timerId: null,
  audioCtx: null,
};

function initAudio() {
  if (!metronome.audioCtx) {
    metronome.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (metronome.audioCtx.state === 'suspended') {
    metronome.audioCtx.resume();
  }
}

function playClick(accent) {
  if (!metronome.audioCtx) return;
  const ctx = metronome.audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = accent ? 1000 : 800;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.08);
}

function scheduleMetronome() {
  if (!metronome.running) return;
  const interval = 60000 / metronome.bpm;
  const now = performance.now();

  if (metronome.nextBeatTime === 0) {
    metronome.nextBeatTime = now;
  }

  while (metronome.nextBeatTime <= now + 50) {
    metronome.currentBeat = (metronome.currentBeat % metronome.beatsPerMeasure) + 1;
    const accent = metronome.currentBeat === 1;
    playClick(accent);
    updateBeatUI(metronome.currentBeat);

    metronome.nextBeatTime += interval;
  }

  metronome.timerId = setTimeout(scheduleMetronome, 25);
}

function updateBeatUI(beat) {
  document.getElementById('beatCount').textContent = beat;
  const dots = document.querySelectorAll('#beatIndicator .beat-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('active', 'accent');
    if (i + 1 === beat) {
      dot.classList.add('active');
      if (beat === 1) dot.classList.add('accent');
    }
  });
}

function toggleMetronome() {
  initAudio();
  metronome.running = !metronome.running;
  const btn = document.getElementById('btnMetronome');
  if (metronome.running) {
    metronome.currentBeat = 0;
    metronome.nextBeatTime = 0;
    btn.textContent = '⏸ 停止';
    btn.classList.add('pulse');
    scheduleMetronome();
  } else {
    if (metronome.timerId) clearTimeout(metronome.timerId);
    btn.textContent = '▶ 开始';
    btn.classList.remove('pulse');
    document.getElementById('beatCount').textContent = '';
    document.querySelectorAll('#beatIndicator .beat-dot').forEach(d => d.classList.remove('active', 'accent'));
  }
}

document.getElementById('btnMetronome').addEventListener('click', toggleMetronome);

});

function renderBeatIndicator() {
  const container = document.getElementById('beatIndicator');
  container.innerHTML = '';
  for (let i = 1; i <= metronome.beatsPerMeasure; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot';
    if (i === 1) dot.classList.add('accent');
    container.appendChild(dot);
  }
}

// ==================== STATS MODULE ====================
function getWeekStart() {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? 6 : day - 1;
  const mon = new Date(now);
  mon.setDate(now.getDate() - diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function getWeekRecords() {
  const weekStart = getWeekStart();
  return appData.records.filter(r => {
    const d = new Date(r.date);
    return d >= weekStart;
  });
}

function renderStats() {
  const validRecords = appData.records.filter(r => r.duration >= 60);
  const totalDays = new Set(validRecords.map(r => r.date)).size;
  const totalSeconds = validRecords.reduce((sum, r) => sum + r.duration, 0);
  const totalMinutes = Math.round(totalSeconds / 60);
  const avgMin = totalDays > 0 ? Math.round(totalMinutes / totalDays) : 0;

  document.getElementById('statDays').textContent = totalDays;
  document.getElementById('statMinutes').textContent = totalMinutes;
  document.getElementById('statAvg').textContent = avgMin;
  document.getElementById('statBest').textContent = appData.bestStreak;

  // Goal
  document.getElementById('goalDays').textContent = appData.weeklyGoal.days;
  document.getElementById('goalMins').textContent = appData.weeklyGoal.minutes;
  document.getElementById('editGoalDays').value = appData.weeklyGoal.days;
  document.getElementById('editGoalMins').value = appData.weeklyGoal.minutes;

  const weekRecords = getWeekRecords();
  const weekDays = new Set(weekRecords.filter(r => r.duration >= appData.weeklyGoal.minutes * 60).map(r => r.date)).size;
  const goalPct = Math.min(100, Math.round(weekDays / appData.weeklyGoal.days * 100));
  document.getElementById('goalBar').style.width = goalPct + '%';
  document.getElementById('goalText').textContent = `本周 ${weekDays}/${appData.weeklyGoal.days} 天达标`;

  // Recent records
  const recent = [...appData.records].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7);
  const container = document.getElementById('recentRecords');
  if (recent.length === 0) {
    container.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px">还没有练习记录</div>';
  } else {
    container.innerHTML = recent.map(r => `
      <div class="record-item">
        <span class="record-date">${r.date}</span>
        <span class="record-dur">${formatTime(r.duration)}</span>
      </div>
    `).join('');
  }
}

document.getElementById('btnSaveGoal').addEventListener('click', () => {
  const days = parseInt(document.getElementById('editGoalDays').value) || 5;
  const mins = parseInt(document.getElementById('editGoalMins').value) || 30;
  appData.weeklyGoal = { days: Math.min(7, Math.max(1, days)), minutes: Math.min(180, Math.max(5, mins)) };
  saveData(appData);
  renderStats();
  alert('目标已保存！');
});

let currentTabCat = '⭐ 入门';
let tabViewMode = 'list'; // 'list' | 'detail'

function renderTabList() {
  const searchTerm = document.getElementById('tabSearch').value.trim().toLowerCase();
  const cats = Object.keys(tabDB);
  const noResult = document.getElementById('tabNoResult');

  if (searchTerm) {
    // Search mode: search across all categories
    document.getElementById('tabCats').style.display = 'none';

    const results = [];
    cats.forEach(cat => {
      (tabDB[cat] || []).forEach((song, idx) => {
        if (song.title.toLowerCase().includes(searchTerm) ||
            song.artist.toLowerCase().includes(searchTerm)) {
          results.push({ cat, idx, song });
        }
      });
    });

    if (results.length === 0) {
      document.getElementById('tabSongList').innerHTML = '';
      noResult.style.display = 'block';
      noResult.textContent = '没有找到匹配"${searchTerm}"的乐谱';
    } else {
      noResult.style.display = 'none';
      const diffLabels = ['', '入门', '初学', '进阶', '高级'];
      document.getElementById('tabSongList').innerHTML = results.map(r => {
        const catLabel = r.cat.replace('⭐ ', '');
        return `
        <div class="tab-song-item" data-cat="${r.cat}" data-idx="${r.idx}">
          <div class="song-info">
            <div class="song-title">${r.song.title}</div>
            <div class="song-artist">${r.song.artist} · ${r.song.key} · ${catLabel}</div>
          </div>
          <span class="song-diff diff-${r.song.diff}">${diffLabels[r.song.diff]}</span>
        </div>`;
      }).join('');
    }

    document.querySelectorAll('#tabSongList .tab-song-item').forEach(item => {
      item.addEventListener('click', () => {
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        showTabDetail(cat, idx);
      });
    });
  } else {
    // Normal mode: category tabs
    document.getElementById('tabCats').style.display = 'flex';
    noResult.style.display = 'none';

    document.getElementById('tabCats').innerHTML = cats.map(cat =>
      `<button class="${cat === currentTabCat ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
    ).join('');

    document.querySelectorAll('#tabCats button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTabCat = btn.dataset.cat;
        document.getElementById('tabSearch').value = '';
        renderTabList();
      });
    });

    const songs = tabDB[currentTabCat] || [];
    const diffLabels = ['', '入门', '初学', '进阶', '高级'];
    document.getElementById('tabSongList').innerHTML = songs.map((song, i) => {
      return `
      <div class="tab-song-item" data-cat="${currentTabCat}" data-idx="${i}">
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          <div class="song-artist">${song.artist} · ${song.key}</div>
        </div>
        <span class="song-diff diff-${song.diff}">${diffLabels[song.diff]}</span>
      </div>`;
    }).join('');

    document.querySelectorAll('#tabSongList .tab-song-item').forEach(item => {
      item.addEventListener('click', () => {
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        showTabDetail(cat, idx);
      });
    });
  }

  // Show list view
  document.getElementById('tabListView').classList.remove('hidden');
  document.getElementById('tabDetailView').classList.add('hidden');
  tabViewMode = 'list';
}

// Search input listener
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('tabSearch');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      if (tabViewMode === 'list') renderTabList();
    });
  }
});

function renderTabToCanvas(tabText) {
  // Parse tab text into systems
  const lines = tabText.split('\n');
  const systems = [];
  let current = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line === '' && current.length === 6) {
      systems.push([...current]);
      current = [];
    } else if (line !== '' && line.match(/^[eBGDAE]\|/)) {
      current.push(line);
    }
  }
  if (current.length === 6) systems.push([...current]);

  if (systems.length === 0) return;

  const canvas = document.getElementById('tabDetailCanvas');
  const ctx = canvas.getContext('2d');

  // Layout constants
  const leftMargin = 36;
  const topMargin = 16;
  const lineSpacing = 18;
  const systemSpacing = 24;
  const charWidth = 9.5;
  const stringNames = ['e', 'B', 'G', 'D', 'A', 'E'];

  // Calculate max chars per line across all systems
  let maxChars = 0;
  for (const sys of systems) {
    for (const line of sys) {
      const content = line.replace(/^.\|/, '');
      if (content.length > maxChars) maxChars = content.length;
    }
  }

  const width = leftMargin + maxChars * charWidth + 8;
  const height = systems.length * (6 * lineSpacing + systemSpacing) + topMargin;

  // Set canvas size (accounting for device pixel ratio)
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(dpr, dpr);

  // Background
  ctx.fillStyle = '#1a1a1e';
  ctx.fillRect(0, 0, width, height);

  ctx.textBaseline = 'middle';

  systems.forEach((sys, si) => {
    const sysY = topMargin + si * (6 * lineSpacing + systemSpacing);

    for (let s = 0; s < 6; s++) {
      const y = sysY + s * lineSpacing;

      // Draw horizontal string line
      ctx.strokeStyle = '#3a3a40';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(leftMargin, y);
      ctx.lineTo(width - 4, y);
      ctx.stroke();

      // Draw string name
      ctx.fillStyle = '#888890';
      ctx.font = '600 10px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(stringNames[s], leftMargin - 8, y);

      // Parse and draw fret numbers
      const line = sys[s];
      const content = line.replace(/^.\|/, '');
      ctx.fillStyle = '#f0f0f2';
      ctx.font = '600 11px "SF Mono", "Menlo", monospace';
      ctx.textAlign = 'center';

      let inBar = false;
      for (let c = 0; c < content.length; c++) {
        const ch = content[c];
        const x = leftMargin + c * charWidth + charWidth / 2;

        if (ch === '|') {
          // Draw bar line
          ctx.strokeStyle = '#5a5a60';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(x, sysY);
          ctx.lineTo(x, sysY + 5 * lineSpacing);
          ctx.stroke();
          inBar = true;
        } else if (ch === '-' || ch === ' ') {
          // skip
        } else if (ch >= '0' && ch <= '9') {
          // Check for multi-digit number
          let num = ch;
          let nextC = c + 1;
          while (nextC < content.length && content[nextC] >= '0' && content[nextC] <= '9') {
            num += content[nextC];
            nextC++;
            c++;
          }
          const numX = leftMargin + (c - num.length + 1) * charWidth + (num.length * charWidth) / 2;
          ctx.fillText(num, numX, y);
        }
      }
    }
  });
}

function showTabDetail(cat, idx) {
  const song = tabDB[cat][idx];
  document.getElementById('tabDetailTitle').textContent = song.title;
  document.getElementById('tabDetailArtist').textContent = song.artist;
  document.getElementById('tabDetailKey').textContent = '调式：' + song.key;
  document.getElementById('tabDetailTips').textContent = '💡 ' + song.tips;

  const diffLabels = ['', '入门', '初学', '进阶', '高级'];
  const diffEl = document.getElementById('tabDetailDiff');
  diffEl.textContent = diffLabels[song.diff];
  diffEl.className = 'song-diff diff-' + song.diff;

  document.getElementById('tabListView').classList.add('hidden');
  document.getElementById('tabDetailView').classList.remove('hidden');
  tabViewMode = 'detail';

  // Render canvas after DOM is visible (needed for proper sizing)
  setTimeout(() => renderTabToCanvas(song.tab), 50);
  document.getElementById('mainContent').scrollTop = 0;
}
